name: toy-shop

services:
  app:
    build: .
    image: gadgettoyshop:latest
    container_name: toy-shop-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_ENABLE_DEV_TOOLS: "false"
      NEXT_PUBLIC_ENABLE_TRAFFIC_TRACKING: "false"
      DATABASE_URL: "postgresql://admin:admin123@postgres:5432/shop_data?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  postgres:
    image: postgres:18
    container_name: toy-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: shop_data
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d shop_data"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
