apiVersion: apps/v1
kind: Deployment
metadata:
  name: gadgettoyshop
  labels:
    app: gadgettoyshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gadgettoyshop
  template:
    metadata:
      labels:
        app: gadgettoyshop
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;']
      containers:
      - name: app
        image: gadgettoyshop:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DATABASE_URL
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PORT
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NODE_ENV
        - name: NEXT_TELEMETRY_DISABLED
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NEXT_TELEMETRY_DISABLED
        - name: NEXT_PUBLIC_SHOP_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NEXT_PUBLIC_SHOP_NAME
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gadgettoyshop
spec:
  selector:
    app: gadgettoyshop
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
